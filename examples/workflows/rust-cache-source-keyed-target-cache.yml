name: Rust Cache With Source-Keyed Target Cache

on:
  workflow_dispatch:
  push:
    paths:
      - app/**

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      LOCAL_WORKSPACE: /tmp/example-workspace
      LOCAL_CARGO_TARGET_DIR: /tmp/example-cargo-target

    defaults:
      run:
        working-directory: /tmp/example-workspace/app

    steps:
      - name: Checkout workflow actions
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            examples/actions/cached-worktree-checkout

      - name: Restore cached worktree
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCAL_WORKSPACE }}
          key: workspace-${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            workspace-${{ runner.os }}-${{ runner.arch }}-${{ github.ref_name }}-

      - name: Checkout cached worktree
        uses: ./examples/actions/cached-worktree-checkout
        with:
          path: ${{ env.LOCAL_WORKSPACE }}
          sparse-paths: app

      - name: Configure Cargo target
        run: mkdir -p "$LOCAL_CARGO_TARGET_DIR"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo home only
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.LOCAL_WORKSPACE }}/app -> ../../example-cargo-target
          cache-targets: false
          shared-key: example-cargo-home-v1

      - name: Compute source key
        id: source-key
        working-directory: ${{ env.LOCAL_WORKSPACE }}
        run: |
          hash="$({ git rev-parse HEAD:app; git ls-files -s app; } | sha256sum | cut -d ' ' -f1)"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Restore source-keyed target
        # Restore the full target directory after rust-cache. Restoring it before
        # rust-cache allows rust-cache cleanup to remove workspace artifacts.
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCAL_CARGO_TARGET_DIR }}
          key: target-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.source-key.outputs.hash }}
          restore-keys: |
            target-v1-${{ runner.os }}-${{ runner.arch }}-

      - name: Build
        env:
          CARGO_TARGET_DIR: ${{ env.LOCAL_CARGO_TARGET_DIR }}
        run: cargo build --workspace --release --locked
