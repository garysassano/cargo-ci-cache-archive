name: S3 Files Cargo Target

on:
  workflow_dispatch:
    inputs:
      file_system_id:
        description: S3 Files file system ID, for example fs-0123456789abcdef0
        required: true
        type: string
      access_point_id:
        description: Optional S3 Files access point ID
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: runs-on=${{ github.run_id }}-s3-files/cpu=12/family=m8azn/image=ubuntu24-full-x64/extras=s3-cache

    env:
      S3_FILES_MOUNT: /mnt/s3-files
      CARGO_TARGET_DIR: /mnt/s3-files/cargo-target
      CARGO_HOME: /mnt/s3-files/cargo-home

    steps:
      - name: Setup RunsOn Magic Cache
        uses: runs-on/action@v2

      - name: Checkout
        uses: actions/checkout@v6

      - name: Mount S3 Files
        uses: ./examples/actions/s3-files-mount
        with:
          file-system-id: ${{ inputs.file_system_id }}
          access-point-id: ${{ inputs.access_point_id }}
          mount-path: ${{ env.S3_FILES_MOUNT }}

      - name: Configure S3 Files paths
        run: mkdir -p "$CARGO_TARGET_DIR" "$CARGO_HOME"

      - name: Optional prewarm
        run: |
          find "$CARGO_TARGET_DIR" -maxdepth 4 -type f >/dev/null || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Unmount S3 Files
        if: always()
        run: sudo umount "$S3_FILES_MOUNT" || true
